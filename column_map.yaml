# column_map.yaml — Explicit column name overrides for ARIA data loading.
#
# Format:  canonical_name: your_column_name
#
# This file maps YOUR column names to ARIA's canonical names.
# Use this when fuzzy matching doesn't resolve correctly, or to lock down
# a specific mapping for a known dataset.
#
# ── aria_synth preset ──────────────────────────────────────────────────────────
# These map the aria_ prefixed columns generated by generate_synthetic_data.py
# to ARIA's canonical column names.

risk_factor:       aria_risk_factor
is_sar:            aria_is_sar
customer_type:     aria_customer_type
dynamic_segment:   aria_dynamic_segment
citizenship:       aria_citizenship
ofac:              aria_ofac
